<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>ARGO | Control Tower</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root {
            --cri-red: #d64545;
            --cri-red-dark: #ba2525;
            --bg-color: #f4f7f6;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --font-main: 'Montserrat', sans-serif;
        }

        html { font-size: 16px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: var(--font-main);
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            background-attachment: fixed;
            margin: 0; 
            padding: 0; 
            color: var(--text-color);
            -webkit-font-smoothing: antialiased;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px 80px 20px;
        }

        .app-header {
            text-align: center;
            margin-bottom: 30px; 
        }

        h1 {
            color: var(--cri-red);
            font-size: 2.2rem; 
            margin: 0 0 5px 0; 
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.5px; 
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-box {
            text-align: center;
            margin-top: 50px;
        }

        .btn-pin {
            background: #1e293b;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(30, 41, 59, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        .btn-pin:active {
            transform: scale(0.96);
        }

        #admin-panel {
            display: none;
        }

        .mezzo-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            transition: transform 0.2s ease;
        }

        .mezzo-info {
            flex: 1;
            min-width: 200px;
        }

        .mezzo-info h3 {
            margin: 0;
            font-size: 1.4rem;
            color: #0f172a;
            font-weight: 800;
        }

        .mezzo-info p {
            margin: 4px 0 0 0;
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
        }

        .targa-badge {
            display: inline-block;
            margin-top: 8px;
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid #cbd5e1;
        }

        .mezzo-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 2;
            min-width: 250px;
        }
        
        select, input {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-family: inherit;
            font-size: 0.95rem;
            width: 100%;
            box-sizing: border-box;
            background: #ffffff;
            color: #1e293b;
            font-weight: 500;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--cri-red);
            box-shadow: 0 0 0 3px rgba(214, 69, 69, 0.1);
        }

        .btn-salva {
            background: linear-gradient(135deg, var(--cri-red) 0%, var(--cri-red-dark) 100%);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-salva:active {
            transform: scale(0.98);
        }

        #loading {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(5px);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: #0f172a;
        }

        .spinner {
            font-size: 2.5rem;
            margin-bottom: 15px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner">⏳</div>
        <div>Aggiornamento Flotta...</div>
    </div>

    <div class="container">
        <header class="app-header">
            <h1>ARGO | Control Tower</h1>
            <p class="subtitle">Gestione Operatività Autoparco</p>
        </header>

        <div class="login-box" id="login-section">
            <button id="btn-login" class="btn-pin">🔒 Inserisci PIN Responsabile</button>
        </div>

        <div id="admin-panel">
            <div id="lista-mezzi">
                <div style="text-align: center; color: #64748b; font-weight: bold;">
                    Scaricamento dati flotta in corso...
                </div>
            </div>
        </div>
    </div>

    <script>
        const PIN_SEGRETO = "V3icoli-"; 
        
        const URL_CSV_HUB = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRMtO9pbvrr-yz1xMwquFeonWlhrwz6R_01HXu0swxX6tqrNok0Xjr6KRfIdYRnnGx8ZvjIoN_9vMQi/pub?output=csv'; 
        const URL_API_APPSCRIPT = 'https://script.google.com/macros/s/AKfycbxz8Y21Wzg2_LtdMUhVJO0oiVR1Y6NCS6i0I_atPJskpMdC21I60sPyfDvp1kKyihqSBA/exec'; 

        let datiMezzi = [];

        // Gestione Login
        document.getElementById('btn-login').addEventListener('click', () => {
            const pin = prompt("🔒 Inserisci il PIN per sbloccare la regia:");
            if (pin === PIN_SEGRETO) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                caricaDatiCSV();
            } else if (pin !== null) {
                alert("❌ PIN Errato.");
            }
        });

        // Lettura dati dal CSV pubblico (usando gli indici geometrici delle colonne)
        function caricaDatiCSV() {
            Papa.parse(URL_CSV_HUB + '&t=' + Date.now(), {
                download: true,
                header: false, 
                complete: function(results) {
                    // Rimuoviamo la riga 0 (titoli delle colonne)
                    let righe = results.data.slice(1);
                    
                    // Filtriamo le righe valide (che hanno la sigla nella colonna B, cioè indice 1)
                    datiMezzi = righe.filter(r => r[1] && r[1].trim() !== '');
                    
                    if (datiMezzi.length === 0) {
                        document.getElementById('lista-mezzi').innerHTML = '<div style="text-align: center; color: #64748b;">Nessun mezzo trovato. Verifica il file Google Sheets.</div>';
                    } else {
                        renderizzaMezzi();
                    }
                },
                error: function(err) {
                    alert("Errore nel caricamento del database mezzi.");
                }
            });
        }

        // Creazione dell'interfaccia per ogni mezzo
        function renderizzaMezzi() {
            const container = document.getElementById('lista-mezzi');
            container.innerHTML = '';

            const opzioniStato = [
                "OPERATIVO",
                "GALLARATE CONV 1",
                "GALLARATE CONV 2",
                "SOMMA LOMBARDO",
                "BACKUP CONV 1",
                "BACKUP CONV 2",
                "BACKUP CONV SOMMA L.DO",
                "AGG. MXP",
                "MANUTENZIONE",
                "FUORI SERVIZIO"
            ];

            datiMezzi.forEach(mezzo => {
                // Lettura da indici: 1=Sigla, 2=Modello, 3=Targa, 4=Stato, 5=Note
                const sigla = mezzo[1] ? mezzo[1].trim() : 'Sconosciuto';
                const modello = mezzo[2] ? mezzo[2].trim() : 'N/D';
                const targa = mezzo[3] ? mezzo[3].trim() : 'N/D';
                const statoAttuale = mezzo[4] ? mezzo[4].trim().toUpperCase() : 'OPERATIVO';
                const noteAttuali = mezzo[5] ? mezzo[5].trim() : '';

                // Creazione menu a tendina
                let opzioniHtml = opzioniStato.map(opt => 
                    `<option value="${opt}" ${statoAttuale.includes(opt) ? 'selected' : ''}>${opt}</option>`
                ).join('');

                const card = document.createElement('div');
                card.className = 'mezzo-card';
                card.innerHTML = `
                    <div class="mezzo-info">
                        <h3>${sigla}</h3>
                        <p>${modello}</p>
                        <div class="targa-badge">${targa}</div>
                    </div>
                    <div class="mezzo-controls">
                        <select id="stato-${sigla}">${opzioniHtml}</select>
                        <input type="text" id="note-${sigla}" value="${noteAttuali}" placeholder="Note (es. In officina da Mario)...">
                        <button class="btn-salva" onclick="salvaMezzo('${sigla}')">💾 Salva Aggiornamento</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Invio dati a Google Apps Script per l'aggiornamento
        async function salvaMezzo(sigla) {
            const nuovoStato = document.getElementById(`stato-${sigla}`).value;
            const nuoveNote = document.getElementById(`note-${sigla}`).value;

            document.getElementById('loading').style.display = 'flex';

            const formData = new URLSearchParams();
            formData.append('sigla', sigla);
            formData.append('stato', nuovoStato);
            formData.append('note', nuoveNote);

            try {
                await fetch(URL_API_APPSCRIPT, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors' 
                });

                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                    alert(`✅ ${sigla} aggiornato!\n\nI monitor dell'HUB si aggiorneranno automaticamente.`);
                }, 1500);

            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                alert("❌ Errore di comunicazione con il server. Riprova.");
            }
        }
    </script>
</body>
</html>
